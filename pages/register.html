<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — CompoundRx Pharmacy</title>
  <link rel="icon" href="../assets/images/favicon.svg" type="image/svg+xml" />
  <link rel="icon" href="../assets/images/favicon.png" type="image/png" />

  <link rel="apple-touch-icon" href="../assets/images/favicon.png" />
  
  <link rel="stylesheet" href="../assets/css/style.css" />
  <link rel="stylesheet" href="../assets/css/dark-mode.css" />
  <link rel="stylesheet" href="../assets/css/rtl.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.2.0/remixicon.min.css" />
  <style>
.auth-page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 5rem 2rem 2rem; /* Increased top padding to clear toggles */
  position: relative;
  background: radial-gradient(circle at top right, rgba(200,146,42,0.05), transparent 40%),
              radial-gradient(circle at bottom left, rgba(200,146,42,0.05), transparent 40%);
}

.auth-toggles {
  position: absolute;
  top: 2rem;
  right: 2rem;
  display: flex;
  gap: 0.75rem;
  z-index: 1100;
}
    .auth-card {
      width: 100%;
      max-width: 480px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      padding: 3rem 2.5rem;
      box-shadow: var(--shadow-lg);
    }
    .brand {
      justify-content: center;
      margin-bottom: 2.5rem;
      display: flex !important;
      flex-direction: row !important;
      flex-wrap: nowrap !important;
      align-items: center !important;
    }
    .brand-name {
      white-space: nowrap !important;
    }
    .auth-header { text-align: center; margin-bottom: 2rem; }
    .auth-header h4 { font-size: 1.8rem; margin-bottom: 0.5rem; font-weight: 500; }
    .auth-header p { font-size: 0.9rem; color: var(--text-muted); }
    
    .input-group { margin-bottom: 1.25rem; }
    .input-label {
      display: block;
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      font-weight: 480;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
    }
    .input-wrapper {
      position: relative;
      width: 100%;
    }
    .input-wrapper i {
      position: absolute;
      left: 1.25rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--gold);
      font-size: 1.1rem;
      pointer-events: none;
      z-index: 5;
    }
    .input-wrapper .form-input {
      display: block;
      width: 100%;
      max-width: 100% !important;
      height: 52px;
      padding-left: 3.5rem;
      padding-right: 3.5rem;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 0.95rem;
      transition: var(--transition);
      box-sizing: border-box;
    }
    .input-wrapper .form-input:focus {
      outline: none;
      border-color: var(--gold);
      background: var(--bg-card);
      box-shadow: 0 0 0 4px rgba(200, 146, 42, 0.1);
    }
    .password-toggle {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      width: 44px;
      height: 44px;
      margin: 0 !important;
      padding: 0;
      color: var(--text-muted);
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition);
      z-index: 5;
    }
    .password-toggle:hover { color: var(--gold); }
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
    }
    @media (max-width: 480px) {
        .form-row { grid-template-columns: 1fr; }
    }
    .auth-divider {
      margin: 1.5rem 0;
      display: flex;
      align-items: center;
      gap: 1rem;
      color: var(--text-muted);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .auth-divider span {
      flex: 0 0 auto;
    }
    .social-auth { display: flex; gap: 1rem; }
    .social-btn {
      flex: 1;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-weight: 500;
      transition: var(--transition);
    }
    .social-btn:hover { background: rgba(200,146,42,0.08); border-color: var(--gold); transform: translateY(-2px); }
    .auth-footer { margin-top: 2rem; text-align: center; font-size: 0.9rem; }
    .auth-footer a { color: var(--gold); font-weight: 500; transition: var(--transition); }
    .auth-footer a:hover { color: var(--gold-light); text-decoration: underline; }

    @media (max-width: 480px) {
      .auth-toggles {
        top: 1.25rem;
        left: auto !important;
        right: 1.25rem !important;
        transform: none !important;
      }
      .auth-page { padding: 5.5rem 1rem 1.5rem !important; }
      .auth-card { padding: 2.5rem 1rem; }
      .brand-name { font-size: 1.1rem !important; }
      .input-wrapper .form-input { padding-left: 2.5rem; }
      .input-wrapper i { left: 0.85rem; }
      .input-group label span { font-size: 0.78rem; }
    }
  </style>
</head>
<body>


<div class="auth-toggles">
  <button class="icon-btn theme-toggle" aria-label="Toggle Theme" title="Toggle Theme"><i class="ri-moon-line"></i></button>
  <button class="icon-btn rtl-toggle" aria-label="Toggle RTL" title="Toggle Direction">RTL</button>
</div>

<main class="auth-page">
  <div class="auth-card">
    <a href="../index.html" class="brand">
      <div class="brand-logo"><i class="ri-flask-line"></i></div>
      <div class="brand-name">CompoundRx <span>Pharmacy</span></div>
    </a>

    <div class="auth-header">
      <h4>Join the Circle</h4>
      <p>Create an account to start your journey</p>
    </div>

    <form id="register-form">
      <div class="input-group">
        <label class="input-label" for="fullname">Full Name</label>
        <div class="input-wrapper">
          <input type="text" id="fullname" class="form-input" placeholder="" required>
        </div>
      </div>

      <div class="input-group">
        <label class="input-label" for="email">Email Address</label>
        <div class="input-wrapper">
          <input type="email" id="email" class="form-input" placeholder="" required>
        </div>
      </div>

        <div class="input-group">
          <label class="input-label" for="password">Password</label>
          <div class="input-wrapper">
            <input type="password" id="password" class="form-input" placeholder="" required>
            <button type="button" class="password-toggle"><i class="ri-eye-line"></i></button>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label" for="confirm">Confirm Password</label>
          <div class="input-wrapper">
            <input type="password" id="confirm" class="form-input" placeholder="" required>
            <button type="button" class="password-toggle"><i class="ri-eye-line"></i></button>
          </div>
        </div>

      <div class="input-group" style="margin-bottom:2rem">
        <label style="display:flex;align-items:center;gap:0.75rem;cursor:pointer;font-size:0.85rem;line-height:1.4">
          <input type="checkbox" style="accent-color:var(--gold)" required>
          <span>I agree to the <a href="#" style="color:var(--gold)">Terms of Service</a> and <a href="#" style="color:var(--gold)">Privacy Policy</a></span>
        </label>
      </div>

      <button type="submit" class="btn btn-primary w-full btn-lg">Create Account</button>

      <div class="auth-divider">
        <span>Or register with</span>
      </div>

      <div class="social-auth">
        <button type="button" class="social-btn"><i class="ri-google-fill"></i> Google</button>
        <button type="button" class="social-btn"><i class="ri-apple-fill"></i> Apple</button>
      </div>

      <p class="auth-footer">
        Already have an account? <a href="login.html">Login here</a>
      </p>
    </form>
  </div>
</main>

<script src="../assets/js/main.js"></script>
</body>
</html>
